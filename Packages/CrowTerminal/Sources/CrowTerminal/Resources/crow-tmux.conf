# Crow's bundled tmux configuration.
#
# Loaded via `tmux -f <path-to-this>` when Crow starts the embedded tmux
# server. Crow drives every action via `tmux <subcommand>` from Swift, so
# this config exists primarily to control the visual surface and the
# escape-sequence passthrough path.
#
# DO NOT load this from a user's ~/.tmux.conf — it's app-internal and
# unbinds every default key. A user-level escape hatch would live at
# ~/.config/crow/tmux.conf and be loaded in addition; not enabled by
# default.

# Required for OSC 133 / OSC 9 / inline-image sequences to reach the
# attached xterm.js surface. Without this, raw escape bytes from the shell
# wrapper are consumed by tmux's emulator. Must be set at server start.
set -gs allow-passthrough on

# 256-color profile for the xterm.js renderer.
set -gs default-terminal screen-256color

# Hide the tmux status bar — Crow has its own session/tab UI. Without
# this, tmux steals one cell row from the terminal surface.
set -gs status off

# Mouse on so wheel scrolls tmux pane history. Selection-clear on
# mouse-up (#445) is fixed by the bindings below, not by disabling mouse
# entirely — that broke wheel scrollback (#452). Apps that need mouse
# (vim, htop, etc.) enable the xterm mouse protocol at runtime, which
# still works alongside this.
set -gs mouse on

# Crow owns the keyboard namespace: the prefix table must end up empty so
# tmux's default `C-b <key>` shortcuts can't fire in the surface. A bare
# `unbind-key -a` (no `-T`) targets the prefix table, but it fails with
# `table prefix doesn't exist` once the table has been cleared — and that
# failure made `source-file` return exit 1 on every reconcile-on-attach
# pass (#451 path), poisoning #451's gating logic (#473).
#
# Pre-creating the table with a stub `Any` binding guarantees `unbind-key
# -a -T prefix` always has something to clear, so the command stays
# idempotent across fresh startup AND `source-file` reloads. Net result is
# the same empty prefix table as before — without the exit-1.
#
# Do NOT widen this to `unbind-key -a -T root`: the mouse fix below relies
# on root-table defaults (`WheelUpPane`, `MouseDrag1Pane`, …) surviving;
# wiping root would re-break #452 wheel scrollback.
bind-key -T prefix Any send-keys
unbind-key -a -T prefix

# Default MouseDragEnd1Pane is `send-keys -X copy-pipe-and-cancel`; the
# -and-cancel exits copy mode after copying, which wipes the visual
# selection. -no-clear keeps the selection highlighted AND copies to the
# macOS pasteboard. Bound in both copy-mode tables since either may be
# active depending on the user's `mode-keys` setting.
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# Single click outside the current selection should clear it (macOS Terminal /
# iTerm2 convention). #452 keeps the copy-mode selection alive after mouse-up
# via `copy-pipe-no-clear`; without this binding a follow-up click leaves the
# old highlight stuck. Mirrors the DoubleClick1Pane wrapper below: forward to
# the inner app if it captured mouse, otherwise cancel copy-mode so the
# selection dismisses. MouseDrag1Pane (which initiates a new selection) still
# fires after this and re-enters copy-mode cleanly.
bind -T root MouseDown1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -X cancel" }

# Same fix for double-click (select-word) and triple-click (select-line)
# on the root table — the defaults also end in `copy-pipe-and-cancel`
# and would otherwise clear the highlight after copying, inconsistent
# with the drag behavior above. The nested if-shell wrappers match the
# tmux defaults: forward the mouse event to the inner app if it's
# captured mouse (`mouse_any_flag`), or to copy-mode if a pane is
# already in a mode; otherwise enter copy mode, select word/line, and
# copy without clearing.
bind -T root DoubleClick1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" { copy-mode -H ; send-keys -X select-word ; run -d0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" } }
bind -T root TripleClick1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" { copy-mode -H ; send-keys -X select-line ; run -d0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" } }

# Pin WheelUpPane to `copy-mode -e` so the pane auto-exits copy-mode once
# wheel-down scrolls back past the bottom of history. Matches tmux ≥3.0
# defaults, but making it explicit insulates Crow from upstream changes
# and pairs with the send-path copy-mode cancel in TmuxBackend.sendText
# (#486) — together they minimize the time a pane sits stuck in copy-mode
# after the user scrolls.
bind -T root WheelUpPane if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" "copy-mode -et=" }

# Default history-limit is 2000 lines per pane. Phase 3 §2 (the spike)
# measured 5 windows × 10k lines as a 400kB RSS delta, so we have plenty
# of headroom. 5000 matches typical session-detail expectations.
set -gs history-limit 5000

# No escape-key delay — interactive editors (vi-mode shells, etc.) feel
# sluggish with tmux's default 500ms.
set -gs escape-time 0

# Emit CSI-u / modifyOtherKeys sequences so the inner app can distinguish
# Shift+Enter from Enter (and other modified keys). Required by Claude
# Code to insert a newline on Shift+Enter instead of submitting.
set -gs extended-keys on

# Advertise the `extkeys` capability for the terminal types we actually
# run under. `default-terminal` above is `screen-256color`, so the docs'
# literal `xterm*:extkeys` glob does NOT match on its own — `screen*` is
# the load-bearing entry here. `-gas` appends to the server-level list so
# tmux's built-in terminal-features merges are preserved; the leading
# comma keeps the append safe when the existing value is empty.
set -gas terminal-features ',screen*:extkeys,xterm*:extkeys'
