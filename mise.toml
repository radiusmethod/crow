[env]
PROJECT_NAME = "Crow"
DERIVED_DATA = "{{cwd}}/.derived-data"

[tools]
zig = "0.15.2"

[tasks.dev]
description = "Run the app in debug mode"
run = "swift run CrowApp"

[tasks.build]
description = "Full build: submodules + ghostty + swift build"
run = "make build"

[tasks."build:release"]
description = "Build release"
run = "swift build -c release"

[tasks."build:ghostty"]
description = "Build GhosttyKit XCFramework"
run = "bash scripts/build-ghostty.sh"

[tasks.test]
description = "Run all tests"
run = "swift test"

[tasks.bundle]
description = "Create .app bundle"
run = "bash scripts/bundle.sh"

[tasks.sign]
description = "Sign, create DMG, and notarize (requires DEVELOPER_ID_APPLICATION)"
depends = ["bundle"]
run = "bash scripts/sign-and-notarize.sh"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf .build .derived-data Crow.app"

[tasks."xcode:generate"]
description = "Generate Xcode project"
run = "swift package generate-xcodeproj"
